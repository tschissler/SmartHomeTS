name: BMWConnector CD

on:
  push:
    branches: [ "main" ]
    paths:
      - .github/workflows/bmwconnector.yml
      - BMWConnector/**
  workflow_dispatch:

env:
  PROJECT_NAME: BMWConnector
  IMAGE_NAME: bmwconnector

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Build and test
      run: dotnet build ${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.slnx

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Generate version information
      id: version
      run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Build and publish multi-architecture Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./${{ env.PROJECT_NAME }}
        file: ./${{ env.PROJECT_NAME }}/dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          tschissler/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          tschissler/${{ env.IMAGE_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false
